meta:
  name: debian-with-options
  tags: 
    - bookworm
  from: debian:bookworm

layer:
  manager:
    name: apt
    options:
      install-recommends: "false"       # Don't install recommended packages (smaller images)
      install-suggests: "false"         # Don't install suggested packages
      allow-unauthenticated: "false"    # Require GPG verification
  actions:
    install:
      packages:
        - curl
        - vim
        - git

publish:
  - type: local
