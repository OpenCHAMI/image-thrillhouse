meta:
  name: bookworm-base
  tags: 
    - bookworm
  from: scratch

layer:
  manager:
    name: mmdebstrap
    options:
      suite: bookworm
      mirror: http://deb.debian.org/debian
      variant: minbase
      mode: fakechroot
  actions:
    install:
      packages:
        - ssh
        - vim
publish:
  - type: registry
    url: vm-host:5000
    tls-verify: false
