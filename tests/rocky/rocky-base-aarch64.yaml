meta:
  name: rocky-base
  tag: "aarch64-9.5"
  from: scratch

layer:
  manager:
    name: dnf
    config: |
      [main]
      gpgcheck=1
      installonly_limit=3
      clean_requirements_on_remove=True
      best=True
      skip_if_unavailable=False
      reposdir=/etc/image-build/yum.repos.d
  repos: 
    - path: /etc/image-build/yum.repos.d/rocky-baseos.repo
      content: |
        [rocky-baseos]
        name=rocky-baseos
        baseurl=https://dl.rockylinux.org/pub/rocky/9/BaseOS/aarch64/os
        enabled=1
        gpgcheck=1
        gpgkey=https://dl.rockylinux.org/pub/rocky/RPM-GPG-KEY-Rocky-9
    - path: /etc/image-build/yum.repos.d/rocky-appstream.repo
      content: |
        [rocky-appstream]
        name=rocky-appstream
        baseurl=https://dl.rockylinux.org/pub/rocky/9/AppStream/aarch64/os/
        enabled=1
        gpgcheck=1
        gpgkey=https://dl.rockylinux.org/pub/rocky/RPM-GPG-KEY-Rocky-9
  files: []
  actions:
    install:
      packages:
        - kernel
        - systemd
      groups:
        - Minimal Install
    commands:
      - run: systemctl disable firewalld
      - script: |
          #!/bin/bash
          echo hello
          dnf clean all
