meta:
  name: debian-scratch-options
  tags: 
    - "bookworm"
  from: scratch

layer:
  manager:
    name: mmdebstrap
    options:
      suite: "bookworm"
      mirror: "http://deb.debian.org/debian"
      variant: "minbase"
      mode: "unshare"
  actions:
    install:
      packages:
        - bash
        - curl

publish:
  - type: local
