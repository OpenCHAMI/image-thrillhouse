# Rocky multi-arch manifest.
#
# Uses the top-level `architectures:` block so each logical layer expands
# into one concrete build per arch. The template
# (../rocky/templates/rocky-base.yaml, rocky-compute.yaml) is authored
# once; per-arch repo URLs live in ../rocky/templates/x86_64.yaml /
# aarch64.yaml. depends_on names the *logical* parent — image-thrillhouse
# wires each concrete child to its same-arch parent automatically.
#
# image-thrillhouse builds a single named layer per invocation. Pick a
# logical layer + arch:
#
#   image-thrillhouse build --manifest tests/manifests/rocky-multiarch.yaml \
#     --layer rocky-base --arch aarch64
#   image-thrillhouse build --manifest tests/manifests/rocky-multiarch.yaml \
#     --layer rocky-compute --arch aarch64
#
# --arch defaults to the host arch when omitted (amd64 → x86_64, arm64 →
# aarch64). Combine with --skip-if-exists to skip layers whose images are
# already in local storage.
#
# To limit a layer to a subset of arches (e.g. a package that only exists
# on x86_64), add `arches: [x86_64]` to that layer.
architectures:
  - name: x86_64
    var_files:
      - ../rocky/templates/x86_64.yaml
  - name: aarch64
    var_files:
      - ../rocky/templates/aarch64.yaml

layers:
  - name: rocky-base
    config: ../rocky/templates/rocky-base.yaml
  - name: rocky-compute
    config: ../rocky/templates/rocky-compute.yaml
    depends_on:
      - rocky-base
