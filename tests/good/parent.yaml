meta:
  name: rocky-base
  tag: "9.5"
  from: docker.io/almalinux:9

layer:
  manager: dnf
  files:
    - path: /opt/imgbuild
      src: /home/travisbcotton/go1.26.2.linux-arm64.tar.gz
  actions:
    install:
      packages:
        - kernel
        - systemd
      groups:
        - Development Tools
      modules:
        - name: nvidia
          stream: latest
          action: enable
    commands:
      - systemctl disable firewalld
