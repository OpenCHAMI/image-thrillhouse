# GitLab CI/CD Pipeline for Go Image-Builder
# This pipeline runs tests, builds, and publishes the image-build tool

stages:
  - test
  - build
  - publish

variables:
  GO_VERSION: "1.21"
  DOCKER_DRIVER: overlay2

# Run tests on every push and merge request
test:unit:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - echo "Running unit tests..."
    - go test -v ./...
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# Run tests with coverage
test:coverage:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - echo "Running tests with coverage..."
    - go test -cover -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:.*?(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.out
      - coverage.html
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Run race detector
test:race:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - echo "Running tests with race detector..."
    - go test -race ./...
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Lint and format check
test:lint:
  stage: test
  image: golangci/golangci-lint:latest
  script:
    - echo "Running linters..."
    - golangci-lint run --timeout 5m
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Validate configuration files
test:validate:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - echo "Building binary for validation..."
    - go build -o image-build ./cmd/image-build
    - echo "Validating test configurations..."
    - ./image-build validate --config tests/rocky/rocky-base-x86_64.yaml || echo "Validation test (expected to need Go modules)"
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Build binary
build:binary:
  stage: build
  image: golang:${GO_VERSION}
  script:
    - echo "Building image-build binary..."
    - go build -v -o image-build ./cmd/image-build
    - ./image-build version
  artifacts:
    paths:
      - image-build
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# Build container image
build:container:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building container image..."
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -f Dockerfile .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# Publish tagged releases
publish:release:
  stage: publish
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Publishing release $CI_COMMIT_TAG..."
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG -f Dockerfile .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

# Security scanning (optional)
security:scan:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
