meta:
  name: rocky-parent-files-mode
  tags:
    - "9.5-files-mode"
  from: docker://rockylinux/rockylinux:9.5

layer:
  manager:
    name: dnf
  files:
    - path: /etc/test-file.txt
      content: |
        This is a test file
        Created during image build
    - path: /usr/local/bin/test-script.sh
      content: |
        #!/bin/bash
        echo "This is an executable script"
      mode: "0755"
    - path: /etc/secure-config.conf
      content: |
        # Secure configuration
        SECRET_KEY=value
      mode: "0600"
    - path: /opt/test/.gitkeep
      content: ""
      mode: "0644"
  actions:
    install:
      packages:
        - bash

publish:
  - type: local
