meta:
  name: rocky-with-options
  tags: 
    - "9"
  from: rockylinux:9

layer:
  manager:
    name: dnf
    options:
      install-weak-deps: "false"    # Smaller images, no weak dependencies
      best: "true"                   # Use best package versions
      skip-broken: "false"           # Don't skip broken packages
      nobest: "false"                # Don't use nobest
  actions:
    install:
      packages:
        - vim
        - curl
        - git

publish:
  - type: local
