name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'cmd/**'
      - 'internal/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: extract_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Determine image tag
        id: set_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_REF}" == refs/pull/* ]]; then
            PR_NUMBER=$(echo "${GITHUB_REF}" | awk -F'/' '{print $3}')
            TAG="pr-${PR_NUMBER}"
          else
            TAG="test"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Computed tag: ${TAG}"
      
      - name: Build and push Docker image (Debian-based)
        if: steps.set_tag.outputs.tag != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/image-build-go:${{ steps.set_tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/image-build-go:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        if: steps.extract_version.outputs.version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '# image-build-go ${{ steps.extract_version.outputs.version }}'
            echo
            echo 'Pull with:'
            echo
            echo '```'
            echo "podman pull ghcr.io/${{ github.repository_owner }}/image-build-go:${{ steps.extract_version.outputs.version }}"
            echo '```'
            echo
            echo '## Changes'
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" -F tag_name="${{ steps.extract_version.outputs.version }}" --jq .body
          } > CHANGELOG.md

      - name: Create release
        if: steps.extract_version.outputs.version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ steps.extract_version.outputs.version }} -F CHANGELOG.md
