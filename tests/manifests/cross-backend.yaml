# Cross-backend manifest.
#
# A single manifest can mix backends — there's nothing tying a DAG to one
# package manager. Here we have three independent roots (apt/mmdebstrap,
# dnf, zypper), each with its own compute layer on top. build-all walks
# them all in topological order; --skip-if-exists makes re-runs cheap.
#
# Useful for sanity-checking that:
#   - the manifest loader is backend-agnostic
#   - layer iteration order respects independent subtrees
#   - per-layer Exists checks work for each publisher type configured
#     (each template here ends in `publish: - type: local`)
layers:
  - name: bookworm-base
    config: ../debian/templates/bookworm-base.yaml
    var_files:
      - ../debian/templates/vars.yaml
    depends_on: []
  - name: rocky-base
    config: ../rocky/templates/rocky-base.yaml
    var_files:
      - ../rocky/templates/x86_64.yaml
    depends_on: []
  - name: suse-base
    config: ../zypper/templates/suse-base.yaml
    var_files:
      - ../zypper/templates/x86_64.yaml
    depends_on: []
  - name: bookworm-compute
    config: ../debian/templates/bookworm-compute.yaml
    var_files:
      - ../debian/templates/vars.yaml
    depends_on:
      - bookworm-base
  - name: rocky-compute
    config: ../rocky/templates/rocky-compute.yaml
    var_files:
      - ../rocky/templates/x86_64.yaml
    depends_on:
      - rocky-base
  - name: suse-compute
    config: ../zypper/templates/suse-compute.yaml
    var_files:
      - ../zypper/templates/x86_64.yaml
    depends_on:
      - suse-base
