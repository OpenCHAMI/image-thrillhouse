meta:
  name: opensuse-scratch-full
  tags:
    - "leap-15.6"
  from: scratch

layer:
  manager:
    name: zypper
    config: |
      [main]
      solver.onlyRequires = true
      rpm.install.excludedocs = no
    options:
      no-recommends: "false"
      no-gpg-checks: "true"
  repos:
    - path: /etc/zypp/repos.d/opensuse-oss.repo
      content: |
        [opensuse-oss]
        name=openSUSE Leap 15.6 OSS
        baseurl=https://download.opensuse.org/distribution/leap/15.6/repo/oss/
        enabled=1
        gpgcheck=0
  actions:
    install:
      packages:
        - bash
        - systemd
        - curl
        - wget
        - vim
    files:
      - path: /etc/test-file.txt
        content: |
          This is a test file for openSUSE
          Created during image build
      - path: /opt/test/.gitkeep
        content: ""

publish:
  - type: local
