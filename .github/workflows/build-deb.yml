name: Build RPM and Debian Packages

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Debian Package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:trixie-20260623
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            runner: ubuntu-latest
          - arch: arm64
            goarch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates \
            curl \
            git \
            debhelper \
            build-essential \
            fakeroot \
            devscripts \
            pkg-config \
            libgpgme-dev

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Regenerate debian/changelog from git tags
        run: bash scripts/gen-changelog.sh
        env:
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Build Debian package
        env:
          DEB_BUILD_OPTIONS: nocheck
          CGO_ENABLED: 1
        run: |
          dpkg-buildpackage -us -uc -b

      - name: List generated packages
        run: |
          ls -lh ../*.deb

      - name: Move packages to workspace
        run: |
          mkdir -p ./packages
          mv ../*.deb ./packages/
          ls -lh ./packages/

      - name: Get package filename
        id: package
        run: |
          DEB_FILE=$(ls ./packages/*.deb | head -n 1)
          DEB_NAME=$(basename "$DEB_FILE")
          echo "file=$DEB_FILE" >> $GITHUB_OUTPUT
          echo "name=$DEB_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: ./packages/*.deb
          retention-days: 30

  build-rpm:
    name: Build RPM Package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux:9
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
            runner: ubuntu-latest
          - arch: aarch64
            goarch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install RPM build tools
        run: |
          dnf install -y dnf-plugins-core
          dnf config-manager --set-enabled powertools
          dnf install -y \
            ca-certificates \
            curl \
            git \
            tar \
            gzip \
            gcc \
            make \
            rpm-build \
            pkgconf-pkg-config \
            gpgme-devel \
            which

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create RPM build structure
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

      - name: Regenerate %changelog from git tags
        run: bash scripts/gen-changelog.sh
        env:
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Update spec file version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" image-thrillhouse.spec
          # Update BuildArch if specified
          if ! grep -q "^BuildArch:" image-thrillhouse.spec; then
            sed -i "/^Release:/a BuildArch:      ${{ matrix.arch }}" image-thrillhouse.spec
          else
            sed -i "s/^BuildArch:.*/BuildArch:      ${{ matrix.arch }}/" image-thrillhouse.spec
          fi
          cat image-thrillhouse.spec

      - name: Create source tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p image-thrillhouse-${VERSION}
          # Copy all files including hidden ones except .git
          shopt -s dotglob
          for file in *; do
            if [ "$file" != ".git" ]; then
              cp -r "$file" image-thrillhouse-${VERSION}/ 2>/dev/null || true
            fi
          done
          tar czf ~/rpmbuild/SOURCES/image-thrillhouse-${VERSION}.tar.gz image-thrillhouse-${VERSION}
          cp image-thrillhouse.spec ~/rpmbuild/SPECS/

      - name: Build RPM package
        env:
          CGO_ENABLED: 1
        run: |
          which go
          go version
          echo "Building for architecture: ${{ matrix.arch }}"
          rpmbuild -bb --nodeps --target=${{ matrix.arch }} ~/rpmbuild/SPECS/image-thrillhouse.spec

      - name: List generated packages
        run: |
          ls -lh ~/rpmbuild/RPMS/*/*.rpm

      - name: Move packages to workspace
        run: |
          mkdir -p ./packages
          cp ~/rpmbuild/RPMS/*/*.rpm ./packages/
          ls -lh ./packages/

      - name: Get package filename
        id: package
        run: |
          RPM_FILE=$(ls ./packages/*.rpm | head -n 1)
          RPM_NAME=$(basename "$RPM_FILE")
          echo "file=$RPM_FILE" >> $GITHUB_OUTPUT
          echo "name=$RPM_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: ./packages/*.rpm
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Debian packages (amd64)
        uses: actions/download-artifact@v4
        with:
          name: debian-package-${{ steps.version.outputs.version }}-amd64
          path: ./packages

      - name: Download Debian packages (arm64)
        uses: actions/download-artifact@v4
        with:
          name: debian-package-${{ steps.version.outputs.version }}-arm64
          path: ./packages

      - name: Download RPM packages (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: rpm-package-${{ steps.version.outputs.version }}-x86_64
          path: ./packages

      - name: Download RPM packages (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: rpm-package-${{ steps.version.outputs.version }}-aarch64
          path: ./packages

      - name: List all packages
        run: |
          ls -lhR ./packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./packages/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
