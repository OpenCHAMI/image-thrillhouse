meta:
  name: suse-base
  tags: 
    - "16"
  from: scratch

layer:
  manager:
    name: zypper
    config: |
      [main]
      reposdir=/etc/image-build/zypp/repos.d
      cachedir=/var/cache/zypp
    options:
      repopath: /etc/image-build/zypp/repos.d
  repos: 
    - path: /etc/image-build/zypp/repos.d/suse-bootstrap.repo
      content: |
        [repo-name]
        name=repo-name
        enabled=1
        autorefresh=0
        baseurl=https://download.opensuse.org/distribution/leap/16.0/repo/oss/
        type=rpm-md
  files: []
  actions:
    install:
      packages:
        - zypper
        - ca-certificates
        - ca-certificates-mozilla
    commands:
      - run: update-ca-certificates
