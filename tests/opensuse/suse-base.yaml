meta:
  name: suse-base
  tag: "16"
  from: scratch

layer:
  manager:
    name: dnf
    config: |
      [main]
      gpgcheck=1
      installonly_limit=3
      clean_requirements_on_remove=True
      best=True
      skip_if_unavailable=False
      reposdir=/etc/image-build/yum.repos.d
  repos: 
    - path: /etc/image-build/yum.repos.d/suse-bootstrap.repo
      content: |
        [suse-bootstrap]
        name=suse-bootstrap
        baseurl=https://download.opensuse.org/distribution/leap/16.0/repo/oss/aarch64/
        enabled=1
        gpgcheck=0
  files: []
  actions:
    install:
      packages:
        - zypper
