name: Build RPM and Debian Packages

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Debian Package (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            goarch: amd64
            runner_arch: X64
          - arch: arm64
            goarch: arm64
            runner_arch: ARM64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Update debian/changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TIMESTAMP=$(date -R)
          cat > debian/changelog << EOF
          image-build (${VERSION}-1) unstable; urgency=medium

            * Release version ${VERSION}

           -- Travis Cotton <travis@example.com>  ${TIMESTAMP}

          EOF
          cat debian/changelog

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            build-essential \
            fakeroot \
            devscripts \
            pkg-config \
            libgpgme-dev \
            libbtrfs-dev \
            libdevmapper-dev

      - name: Install cross-compilation tools for arm64
        if: matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libgpgme-dev:arm64 \
            libbtrfs-dev:arm64 \
            libdevmapper-dev:arm64

      - name: Build Debian package
        env:
          DEB_BUILD_OPTIONS: nocheck
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          PKG_CONFIG_PATH: ${{ matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: |
          dpkg-buildpackage -us -uc -b -a${{ matrix.arch }}

      - name: List generated packages
        run: |
          ls -lh ../*.deb

      - name: Move packages to workspace
        run: |
          mkdir -p ./packages
          mv ../*.deb ./packages/
          ls -lh ./packages/

      - name: Get package filename
        id: package
        run: |
          DEB_FILE=$(ls ./packages/*.deb | head -n 1)
          DEB_NAME=$(basename "$DEB_FILE")
          echo "file=$DEB_FILE" >> $GITHUB_OUTPUT
          echo "name=$DEB_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: ./packages/*.deb
          retention-days: 30

  build-rpm:
    name: Build RPM Package (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            goarch: amd64
          - arch: aarch64
            goarch: arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install RPM build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm \
            pkg-config \
            libgpgme-dev \
            libbtrfs-dev \
            libdevmapper-dev

      - name: Install cross-compilation tools for aarch64
        if: matrix.arch == 'aarch64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libgpgme-dev:arm64 \
            libbtrfs-dev:arm64 \
            libdevmapper-dev:arm64

      - name: Create RPM build structure
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          
      - name: Update spec file version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" image-build.spec
          # Update BuildArch if specified
          if ! grep -q "^BuildArch:" image-build.spec; then
            sed -i "/^Release:/a BuildArch:      ${{ matrix.arch }}" image-build.spec
          else
            sed -i "s/^BuildArch:.*/BuildArch:      ${{ matrix.arch }}/" image-build.spec
          fi
          cat image-build.spec

      - name: Create source tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p image-build-${VERSION}
          # Copy all files including hidden ones except .git
          shopt -s dotglob
          for file in *; do
            if [ "$file" != ".git" ]; then
              cp -r "$file" image-build-${VERSION}/ 2>/dev/null || true
            fi
          done
          tar czf ~/rpmbuild/SOURCES/image-build-${VERSION}.tar.gz image-build-${VERSION}
          cp image-build.spec ~/rpmbuild/SPECS/

      - name: Build RPM package
        env:
          PATH: ${{ env.PATH }}:${{ env.GOROOT }}/bin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.arch == 'aarch64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          PKG_CONFIG_PATH: ${{ matrix.arch == 'aarch64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: |
          which go
          go version
          echo "Building for architecture: ${{ matrix.arch }}"
          echo "GOARCH: ${GOARCH}"
          rpmbuild -bb --nodeps --target=${{ matrix.arch }} ~/rpmbuild/SPECS/image-build.spec

      - name: List generated packages
        run: |
          ls -lh ~/rpmbuild/RPMS/*/*.rpm

      - name: Move packages to workspace
        run: |
          mkdir -p ./packages
          cp ~/rpmbuild/RPMS/*/*.rpm ./packages/
          ls -lh ./packages/

      - name: Get package filename
        id: package
        run: |
          RPM_FILE=$(ls ./packages/*.rpm | head -n 1)
          RPM_NAME=$(basename "$RPM_FILE")
          echo "file=$RPM_FILE" >> $GITHUB_OUTPUT
          echo "name=$RPM_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: ./packages/*.rpm
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Debian packages (amd64)
        uses: actions/download-artifact@v4
        with:
          name: debian-package-${{ steps.version.outputs.version }}-amd64
          path: ./packages

      - name: Download Debian packages (arm64)
        uses: actions/download-artifact@v4
        with:
          name: debian-package-${{ steps.version.outputs.version }}-arm64
          path: ./packages

      - name: Download RPM packages (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: rpm-package-${{ steps.version.outputs.version }}-x86_64
          path: ./packages

      - name: Download RPM packages (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: rpm-package-${{ steps.version.outputs.version }}-aarch64
          path: ./packages

      - name: List all packages
        run: |
          ls -lhR ./packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./packages/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
