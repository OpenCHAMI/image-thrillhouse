meta:
  name: invalid-zypper-test
  tags: 
    - "leap-15.6"
  from: scratch

layer:
  manager:
    name: zypper
    config: |
      [main]
      solver.onlyRequires = true
    options:
      invalid_option: "should_fail"
  repos:
    - path: /etc/zypp/repos.d/opensuse-oss.repo
      content: |
        [opensuse-oss]
        name=openSUSE Leap 15.6 OSS
        baseurl=https://download.opensuse.org/distribution/leap/15.6/repo/oss/
        enabled=1
        gpgcheck=1
        gpgkey=https://download.opensuse.org/distribution/leap/15.6/repo/oss/repodata/repomd.xml.key
  actions:
    install:
      packages:
        - bash

publish:
  - type: local
