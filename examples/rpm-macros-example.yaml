meta:
  name: example-with-custom-macros
  from: scratch
  tags:
    - latest

layer:
  manager:
    name: dnf
    config: |
      [main]
      gpgcheck=1
      installonly_limit=3
      clean_requirements_on_remove=True
      best=True
      skip_if_unavailable=False
      reposdir=/etc/image-build/yum.repos.d
    options:
      releasever: "8"
      install-weak-deps: "false"
      # Custom RPM macros using the macro.* prefix
      # These will be added to /etc/rpm/macros.image-build
      macro._dbpath: /var/lib/rpm
      macro._dbpath_trans: /var/lib/rpm
      # You can also override default macros
      macro._netsharedpath: /sys:/proc

  repos:
    - path: /etc/image-build/yum.repos.d/rocky.repo
      content: |
        [baseos]
        name=Rocky Linux $releasever - BaseOS
        baseurl=https://mirrors.rockylinux.org/mirrormanager/yum/$releasever/BaseOS/$basearch/os/
        gpgcheck=1
        enabled=1
        gpgkey=https://dl.rockylinux.org/pub/rocky/RPM-GPG-KEY-Rocky-$releasever
        
  actions:
    install:
      packages:
        - bash
        - coreutils
        - systemd

publish:
  - type: local
    path: /tmp/example-custom-macros.tar
