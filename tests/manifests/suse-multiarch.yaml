# openSUSE Leap multi-arch manifest.
#
# Same shape as rocky-multiarch.yaml but exercises the zypper backend.
# The per-arch repo base URL is supplied by the x86_64.yaml / aarch64.yaml
# var files (openSUSE serves aarch64 from a "ports/" prefix, which is why
# the templates read .repobase from vars instead of hard-coding).
architectures:
  - name: x86_64
    var_files:
      - ../zypper/templates/x86_64.yaml
  - name: aarch64
    var_files:
      - ../zypper/templates/aarch64.yaml

layers:
  - name: suse-base
    config: ../zypper/templates/suse-base.yaml
  - name: suse-compute
    config: ../zypper/templates/suse-compute.yaml
    depends_on:
      - suse-base
