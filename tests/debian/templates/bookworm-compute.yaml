meta:
  name: bookworm-compute
  tags: 
    - "{{ .tag }}"
  from: vm-host:5000/bookworm-base:{{ .bookworm_base_tag }}

layer:
  manager:
    name: apt 
  repos:
    - path: {{ .reposdir }}/debian.list
      content: |
        deb [signed-by=/usr/share/keyrings/debian-archive-keyring.gpg] http://deb.debian.org/debian bookworm main
  actions:
    install:
      packages:
        - systemd
publish:
  - type: local
